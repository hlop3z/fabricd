version: '3'

# NOTE: this workspace path-depends on a sibling checkout of the box repo
# (../runlet-js) for the `fabric-wire` contract crate. Clone it first:
#   git clone https://github.com/hlop3z/runlet-js ../runlet-js

tasks:
  default:
    desc: Run all checks (lint, format, test, supply chain)
    cmds:
      - task: check
      - task: supply-chain

  # ── Build & Test ──────────────────────────────────────────

  build:
    desc: Build the project
    cmds:
      - cargo build

  build-release:
    desc: Build in release mode (LTO, stripped)
    cmds:
      - cargo build --release

  test:
    desc: Run unit tests
    cmds:
      - cargo test

  run:
    desc: Run the daemon (config via FABRICD_CONFIG, default fabricd.json)
    cmds:
      - cargo run -p fabricd

  # ── Code Quality ──────────────────────────────────────────

  check:
    desc: Run all code quality checks
    cmds:
      - task: fmt-check
      - task: clippy
      - task: test

  fmt:
    desc: Format code
    cmds:
      - cargo fmt

  fmt-check:
    desc: Check formatting without modifying files
    cmds:
      - cargo fmt --check

  clippy:
    desc: Run clippy with strict lints
    cmds:
      - cargo clippy

  clippy-fix:
    desc: Auto-fix clippy warnings
    cmds:
      - cargo clippy --fix --allow-dirty

  # ── Supply Chain Security ─────────────────────────────────

  supply-chain:
    desc: Run all supply chain security checks
    cmds:
      - task: audit
      - task: deny
      - task: vet

  audit:
    desc: Scan dependencies for known vulnerabilities (cargo-audit)
    preconditions:
      - sh: command -v cargo-audit
        msg: "cargo-audit not installed. Run: cargo install cargo-audit"
    cmds:
      - cargo audit

  deny:
    desc: Check licenses, bans, advisories, and sources (cargo-deny)
    preconditions:
      - sh: command -v cargo-deny
        msg: "cargo-deny not installed. Run: cargo install cargo-deny"
    cmds:
      - cargo deny check

  vet:
    desc: Verify all third-party deps have been audited (cargo-vet)
    preconditions:
      - sh: command -v cargo-vet
        msg: "cargo-vet not installed. Run: cargo install cargo-vet"
    cmds:
      - cargo vet

  # ── Setup ─────────────────────────────────────────────────

  setup:
    desc: Install all required cargo tools
    cmds:
      # cargo-vet is PINNED in lockstep with CI (.github/workflows/ci.yml): the
      # imports.lock format changes across versions (0.10.2 writes `trusted-publisher`
      # entries that 0.10.0 cannot parse), so local and CI must run the same version.
      # Bump both together.
      - cargo install cargo-audit cargo-deny
      - cargo install cargo-vet --version 0.10.2 --locked

  # ── Clean ─────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  # -- Docker -----------------------------------------------

  docker-build:
    desc: Build the Docker image (context = parent dir, needs ../runlet-js)
    cmds:
      - docker build -t fabricd -f Dockerfile ..

  docker-run:
    desc: Run the container with a mounted fabricd.json
    cmds:
      - docker run --rm -v "$(pwd)/fabricd.json:/app/fabricd.json:ro" fabricd
