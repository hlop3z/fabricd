schema: spec-driven

# Project context — shown to AI when creating artifacts.
context: |
  fabricd: the egress sidecar / broker for runlet (github.com/hlop3z/runlet-js), the
  sandboxed JavaScript execution service. It holds the operator credential table
  (`resources`) and ALL the vendor drivers (Postgres/Mongo/SMTP/Redis/AMQP-NATS/OIDC);
  the box holds neither. One session per box request (Init(names+deadline+tenant) ->
  Call* -> Drain(metrics)) over a local UDS or a remote QUIC listener with pluggable
  client auth (none/static/sa-token). Resolution is tenant-scoped; credentials never
  reach the box.

  The wire contract (fabric-wire: Egress trait, framing, QUIC transport, error taxonomy)
  is OWNED by the runlet-js repo and consumed as a sibling-checkout path dependency —
  this daemon is replaceable by anything that speaks the contract. Contract changes are
  made in runlet-js first.

  Tech stack: Rust (tokio, quinn, tokio-postgres, mongodb, lettre, redis, amqprs,
  async-nats, jsonwebtoken), one process-wide aws-lc-rs rustls provider (never ring).
  Strict lint gauntlet (Cargo.toml [lints], same as runlet-js): denies clippy
  all/pedantic/nursery/cargo + many restriction lints (no unwrap/expect/panic, no bare
  arithmetic, no `as` casts).

  Spec conventions: specs/ holds the WHAT (testable behavioral requirements + scenarios).
  The WHY (lessons, measured trade-offs, decision trail) stays in the runlet-js repo's
  docs/design/, linked.

